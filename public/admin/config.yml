backend:
  name: github
  repo: plainlicense/plainlicense
  branch: main
  base_url: https://auth.plainlicense.org  # Custom OAuth proxy

publish_mode: editorial_workflow
local_backend: true

media_folder: public/images
public_folder: /images

collections:
  - name: licenses
    label: Licenses
    folder: content/licenses
    path: '{{category}}/{{slug}}'
    create: true
    identifier_field: spdx_id
    fields:
      # Zone 1 — Identity
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Plain language name (e.g. 'Plain MIT License')", name: "plain_name", widget: "string"}
      - {label: "SPDX ID", name: "spdx_id", widget: "string"}
      - {label: "Version of this plain language version", name: "plain_version", widget: "string", hint: "Semver, e.g. 1.0.0"}
      - name: license_family
        label: License family
        widget: select
        options: [public-domain, permissive, copyleft, source-available, proprietary]
      - {label: "Is this a public domain dedication (not a license)?", name: "is_dedication", widget: "boolean", default: false}
      - {label: "Status", name: "status", widget: "select", options: ["draft", "published"], default: "draft"}
      - {label: "Description (1–3 sentences, answers 'what kind of license is this?')", name: "description", widget: "text"}
      - name: tldr
        label: "TL;DR — 2 to 4 bullets (answers 'what do I need to know right now?')"
        widget: list
        field: {widget: string}

      # Zone 3 — Conditions
      - {label: "Requires attribution?", name: "attribution_required", widget: "boolean", default: false}
      - {label: "Additional how-to instructions (leave blank for most licenses)", name: "extra_how", widget: "markdown", required: false}

      # Clause mapping
      - {label: "Has a clause map?", name: "has_mapping", widget: "boolean", default: false}
      - {label: "Clause map version", name: "mapping_version", widget: "string", required: false, hint: "Semver. Required if has_mapping is true."}

      # Display controls
      - {label: "Show original comparison?", name: "show_original_comparison", widget: "boolean", default: true}
      - {label: "Show shame counter?", name: "show_shame_counter", widget: "boolean", default: true}
      - {label: "Featured?", name: "featured", widget: "boolean", default: false}
      - {label: "Fair Code license?", name: "fair_code", widget: "boolean", default: false}

      # SEO
      - {label: "Meta description (overrides auto-generated)", name: "meta_description", widget: "string", required: false}
      - {label: "OG Image", name: "og_image", widget: "image", required: false}
      - {label: "Authors", name: "authors", widget: "list", required: false}
      - {label: "Changelog", name: "changelog", widget: "text", required: false}

      # Readability metrics (computed at build time)
      - {label: "Readability: Gunning Fog", name: "plain_gunning_fog", widget: "number", value_type: "float", required: false}
      - {label: "Shame Words Count", name: "shame_words_count", widget: "number", value_type: "int", required: false}

      # Original license
      - name: original
        label: "Original license (leave blank for PlainLicense originals)"
        widget: object
        required: false
        fields:
          - {label: "Full original name (e.g. 'MIT License')", name: "name", widget: "string"}
          - {label: "SPDX identifier", name: "spdx_id", widget: "string", required: false}
          - {label: "Version (raw, e.g. '2.0')", name: "version", widget: "string", required: false}
          - {label: "Display version (e.g. 'MIT License (1988)')", name: "version_display", widget: "string", required: false}
          - {label: "Steward organization", name: "organization", widget: "string", required: false}
          - {label: "Has a single official authoritative source?", name: "has_official_source", widget: "boolean", default: false}
          - {label: "Canonical URL", name: "canonical_url", widget: "string"}
          - {label: "Does the original text include a link to its own canonical URL?", name: "link_in_original", widget: "boolean", default: false}
          - {label: "Deprecated in SPDX?", name: "is_deprecated", widget: "boolean", default: false}
          - {label: "OSI Approved", name: "is_osi_approved", widget: "boolean", required: false}
          - {label: "FSF Approved", name: "is_fsf_approved", widget: "boolean", required: false}
          - name: permissions
            label: "Permissions (choosealicense.com tags)"
            widget: select
            multiple: true
            required: false
            options: [commercial-use, distribution, modifications, patent-use, private-use, revokable]
          - name: conditions
            label: "Conditions (choosealicense.com tags)"
            widget: select
            multiple: true
            required: false
            options: [disclose-source, document-changes, include-copyright, include-copyright--source, network-use-disclose, same-license, same-license--file, same-license--library]
          - name: limitations
            label: "Limitations (choosealicense.com tags)"
            widget: select
            multiple: true
            required: false
            options: [liability, patent-use, trademark-use, warranty]

      - {label: "Body", name: "body", widget: "markdown"}

  - name: blog
    label: Blog
    folder: content/blog/posts
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Author", name: "author", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Tags", name: "tags", widget: "list", required: false}
      - {label: "Category", name: "category", widget: "select", options: ["announcements", "tutorials", "updates"], required: false}
      - {label: "Featured", name: "featured", widget: "boolean", default: false, required: false}
      - {label: "OG Image", name: "og_image", widget: "image", required: false}
      - {label: "Related Licenses", name: "related_licenses", widget: "list", required: false}
      - {label: "Status", name: "status", widget: "select", options: ["draft", "published"], default: "draft"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: template-blocks
    label: Template Blocks
    folder: content/template-blocks
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Block ID", name: "block_id", widget: "string"}
      - {label: "Category", name: "category", widget: "select", options: ["warranty", "permission", "condition", "disclaimer", "notice"]}
      - {label: "Description", name: "description", widget: "text", required: false}
      - {label: "Version", name: "version", widget: "string"}
      - {label: "Block Title", name: "block_title", widget: "string", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

