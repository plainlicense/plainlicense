backend:
  name: github
  repo: plainlicense/plainlicense
  branch: main
  base_url: https://auth.plainlicense.org  # Custom OAuth proxy

publish_mode: editorial_workflow
local_backend: true

media_folder: public/images
public_folder: /images

collections:
  - name: licenses
    label: Licenses
    folder: content/licenses
    path: '{{category}}/{{slug}}'
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "SPDX ID", name: "spdx_id", widget: "string"}
      - {label: "Version", name: "version", widget: "string"}
      - {label: "Original Version", name: "original_version", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Changelog", name: "changelog", widget: "text", required: false}
      - {label: "Status", name: "status", widget: "select", options: ["draft", "published"], default: "draft"}
      - {label: "License Type", name: "license_type", widget: "select", options: ["permissive", "copyleft", "source-available", "public-domain"]}
      - {label: "OSI Approved", name: "is_osi_approved", widget: "boolean"}
      - {label: "FSF Approved", name: "is_fsf_approved", widget: "boolean"}
      - {label: "Fair Code", name: "fair_code", widget: "boolean", default: false, required: false}
      - {label: "Featured", name: "featured", widget: "boolean", default: false, required: false}
      - {label: "Summary", name: "summary", widget: "text", required: false}
      - {label: "Use Cases", name: "use_cases", widget: "list", required: false}
      - {label: "Restrictions", name: "restrictions", widget: "object", fields: [
          {label: "Commercial Use", name: "commercial_use", widget: "boolean", required: false},
          {label: "Attribution Required", name: "attribution_required", widget: "boolean", required: false},
          {label: "Share Alike", name: "share_alike", widget: "boolean", required: false}
        ], required: false}
      - {label: "Canonical URL", name: "canonical_url", widget: "string", required: false}
      - {label: "Author", name: "author", widget: "string", required: false}
      - {label: "Meta Description", name: "meta_description", widget: "text", required: false}
      - {label: "OG Image", name: "og_image", widget: "image", required: false}
      - {label: "Has Mapping", name: "has_mapping", widget: "boolean", default: false, required: false}
      - {label: "Mapping Version", name: "mapping_version", widget: "string", required: false}
      - {label: "Show Original Comparison", name: "show_original_comparison", widget: "boolean", default: true, required: false}
      - {label: "Show Shame Counter", name: "show_shame_counter", widget: "boolean", default: true, required: false}
      - {label: "Readability: Gunning Fog", name: "plain_gunning_fog", widget: "number", value_type: "float", required: false}
      - {label: "Shame Words Count", name: "shame_words_count", widget: "number", value_type: "int", required: false}
      - {label: "Created Date", name: "created_date", widget: "datetime", required: false}
      - {label: "Last Modified", name: "last_modified", widget: "datetime", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: blog
    label: Blog
    folder: content/blog/posts
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Author", name: "author", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Tags", name: "tags", widget: "list", required: false}
      - {label: "Category", name: "category", widget: "select", options: ["announcements", "tutorials", "updates"], required: false}
      - {label: "Featured", name: "featured", widget: "boolean", default: false, required: false}
      - {label: "OG Image", name: "og_image", widget: "image", required: false}
      - {label: "Related Licenses", name: "related_licenses", widget: "list", required: false}
      - {label: "Status", name: "status", widget: "select", options: ["draft", "published"], default: "draft"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: template-blocks
    label: Template Blocks
    folder: content/template-blocks
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Category", name: "category", widget: "select", options: ["warranty", "permission", "condition"]}
      - {label: "Description", name: "description", widget: "text", required: false}
      - {label: "Body", name: "body", widget: "markdown"}
