name: Tests

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  unit:
    name: Unit & Integration Tests
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4
    - uses: jdx/mise-action@v2
      with:
        install: true
        cache: true

    - name: Install dependencies
      run: bun install

    - name: Run unit tests
      run: mise run test --unit

  e2e:
    name: E2E Tests
    timeout-minutes: 45
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Run E2E only after unit tests pass to avoid wasting build time on a broken codebase.
    # Remove this dependency if you need E2E results even when unit tests fail.
    needs: unit
    steps:
    - uses: actions/checkout@v4
    - uses: jdx/mise-action@v2
      with:
        install: true
        cache: true

    - name: Install dependencies
      run: bun install

    - name: Install Typst
      run: |
        curl -L https://github.com/typst/typst/releases/latest/download/typst-x86_64-unknown-linux-musl.tar.xz -o typst.tar.xz
        tar -xJf typst.tar.xz
        sudo mv typst-x86_64-unknown-linux-musl/typst /usr/local/bin/
        rm -rf typst.tar.xz typst-x86_64-unknown-linux-musl

    - name: Build site
      run: mise run build

    - name: Install Playwright Browsers
      run: bunx playwright install --with-deps

    - name: Run E2E tests
      run: mise run test --e2e

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
