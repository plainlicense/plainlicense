---
# Pre-commit configuration file for managing hooks
# Defines hooks for linting, formatting, and other checks from git actions
# See https://pre-commit.com for more information.
# Stages:
# - commit-msg: Runs to validate commit messages
# - post-checkout: Runs after a git checkout
# - post-commit: Runs after a commit is made
# - post-merge: Runs after a merge is completed
# - post-rewrite: Runs after a commit is rewritten
# - pre-commit: Runs before a commit is made
# - pre-merge-commit: Runs before a merge commit is created
# - pre-push: Runs before pushing changes to a remote repository
# - pre-rebase: Runs before a rebase operation
# - prepare-commit-msg: Runs to prepare the commit message
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit, pre-merge-commit, pre-push]
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
        stages: [pre-commit, pre-merge-commit, pre-push]
      - id: check-yaml
        stages: [pre-commit, pre-merge-commit, pre-push]
        types: [yaml]
      - id: check-added-large-files
        stages: [pre-commit, pre-merge-commit, pre-push]
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.18.1
    hooks:
      - id: markdownlint-cli2
        args: [--config, .markdownlint.yml, --fix, "*.md","docs/**/*.md", "packages/**/*.md", "assets/**/*.md", "*.md", "UNLICENSE"]
        stages: [pre-commit, pre-merge-commit, pre-push]
        types: [markdown]
  - repo: https://github.com/crate-ci/typos
    rev: v1
    hooks:
      - id: typos
        stages: [pre-commit, pre-merge-commit, pre-push]
        exclude: |
          (?x)^(
            assets/|
            docs/assets/|
            .venv/|
            .vscode/|
            .idea/|
            .gitattributes|
            .gitignore|
            .pre-commit-config.yaml|
            .markdownlint.yml|
            node_modules/|
            packages/.*?/node_modules|
            external/)
        types_or: [text]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff-check
        args: ["--fix"]
        stages: [pre-commit, pre-merge-commit, pre-push]
        types: [python]
      - id: ruff-format
        stages: [pre-commit, pre-merge-commit, pre-push]
        types: [python]
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.22.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        args: [--config, commitlint.config.ts]
  - repo: https://github.com/biomejs/pre-commit
    rev: v2.0.0-beta.6 # Use the sha / tag you want to point at
    hooks:
      - id: biome-check
        args: ["--write", "--unsafe", "--formatter-enabled", "--assists-enabled", "--linter-enabled", "--max-diagnostics", "100", "--staged", "--config", "biome.jsonc", "--files-ignore-unknown=true"]
        stages: [pre-commit, pre-merge-commit, pre-push]
        types: [text]
      - id: biome-ci
        args: ["--formatter-enabled", "--assists-enabled", "--linter-enabled", "--max-diagnostics", "100", "--config", "biome.jsonc", "--changed"]
        stages: [post-checkout, post-merge]
      - id: biome-check
        args: ["--write", "--unsafe", "--formatter-enabled", "--assists-enabled", "--linter-enabled", "--max-diagnostics", "100", "--staged", "--config", "src/build/biome.jsonc", "--files-ignore-unknown=true"]
        stages: [pre-commit, pre-merge-commit, pre-push]
        types: [text]
  # TODO: Align the commands with the makefile/package.json
  - repo: local
    hooks:
      - id: shellcheck
        language: system
        name: Shellcheck
        stages: [pre-commit]
        entry: shellcheck -x -S error
        types: [shell]
      - id: build
        name: Build
        language: system
        entry: bun run -b build
        files: src/.*?.ts
        types: [ts]
        stages: [pre-commit]
      - id: stylelint
        name: Stylelint
        language: system
        entry: bun run -b stylelint --fix
        files: src/assets/stylesheets/.*?.css
        types: [css]
        stages: [pre-commit]
      - id: prettier
        name: Prettier
        language: system
        entry: bun run -b prettier --write
        types: [json, yaml, toml]
        exclude: |
          (?x)^(
            node_modules/|
            packages/.*?/node_modules|
            external/)
        stages: [pre-commit]
      - id: commitizen
        name: Commitizen
        language: system
        entry: bun run -b git-cz
        exclude: |
          (?x)^(
            node_modules/|
            packages/.*?/node_modules|
            external/)
        stages: [prepare-commit-msg]
        types: [file]
        branch: |
          (?x)^(
            main|
            dev/*)
        always_run: true
